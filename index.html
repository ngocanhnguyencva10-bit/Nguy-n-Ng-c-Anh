
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyến Phiêu Lưu Văn Hoá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fefce8;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
            font-style: italic;
        }
        .heritage-gradient {
            background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%);
        }
        
        @keyframes floating {
            0% { transform: translate(0, 0px); }
            50% { transform: translate(10px, -20px); }
            100% { transform: translate(0, 0px); }
        }

        @keyframes floating-slow {
            0% { transform: translate(0, 0px) rotate(0deg); }
            50% { transform: translate(-15px, 15px) rotate(5deg); }
            100% { transform: translate(0, 0px) rotate(0deg); }
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
            50% { transform: scale(1.02); box-shadow: 0 20px 25px -5px rgb(251 191 36 / 0.2); }
            100% { transform: scale(1); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        }

        @keyframes shake-refined {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes blur-brief {
            0% { filter: blur(0px); }
            50% { filter: blur(4px); }
            100% { filter: blur(0px); }
        }

        @keyframes icon-burst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0; transform: translateY(-100px); }
        }

        @keyframes fadeInZoom {
            from { opacity: 0; transform: scale(0.99) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes scale-punch {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-scale-punch {
            animation: scale-punch 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-floating {
            animation: floating 8s ease-in-out infinite;
        }

        .animate-floating-slow {
            animation: floating-slow 12s ease-in-out infinite;
        }

        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }

        .animate-shake-refined {
            animation: shake-refined 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .animate-blur-pop {
            animation: blur-brief 0.4s ease-out;
        }

        .animate-icon-burst {
            animation: icon-burst 0.8s forwards;
        }

        .animate-screen-transition {
            animation: fadeInZoom 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .animate-slide-in {
            animation: slideInRight 0.5s ease-out forwards;
        }

        .parallax-layer {
            transition: transform 0.2s cubic-out;
            pointer-events: none;
        }

        @keyframes bounce-refined {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow-green {
            0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); border-color: rgb(34 197 94 / 0.5); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); border-color: rgb(34 197 94); }
        }

        @keyframes glow-red {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); border-color: rgb(239 68 68 / 0.5); }
            50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); border-color: rgb(239 68 68); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .animate-bounce-refined { animation: bounce-refined 0.5s ease infinite; }
        .animate-glow-green { animation: glow-green 1.5s ease-in-out infinite; }
        .animate-glow-red { animation: glow-red 1.5s ease-in-out infinite; }
        .confetti-particle {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
            animation: confetti-fall 3s linear forwards;
        }

        .correct-container {
            border-color: #22c55e !important; /* Green-500 */
            background-color: #f0fdf4 !important; /* Green-50 */
            animation: glow-green 1.5s ease-in-out infinite;
        }

        .incorrect-container {
            border-color: #ef4444 !important; /* Red-500 */
            background-color: #fef2f2 !important; /* Red-50 */
            animation: shake-refined 0.5s cubic-bezier(.36,.07,.19,.97) both, glow-red 1.5s ease-in-out infinite;
        }

        @keyframes lantern-sway {
            0%, 100% { transform: rotate(-5deg); transform-origin: top center; }
            50% { transform: rotate(5deg); transform-origin: top center; }
        }

        @keyframes lantern-glow-yellow {
            0%, 100% { box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); filter: brightness(1); }
            50% { box-shadow: 0 0 40px rgba(245, 158, 11, 0.9); filter: brightness(1.3); }
        }

        .animate-lantern-sway {
            animation: lantern-sway 3s ease-in-out infinite;
        }

        .lantern-lit-yellow {
            animation: lantern-glow-yellow 2s ease-in-out infinite, lantern-sway 3s ease-in-out infinite;
            background-color: #fef3c7 !important;
            border-color: #f59e0b !important;
        }

        .lantern-shape {
            position: relative;
            width: 120px;
            height: 150px;
            background-color: #ef4444; /* Default red */
            border-radius: 40px 40px 60px 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #b91c1c;
        }

        .lantern-shape::before {
            content: '';
            position: absolute;
            top: -10px;
            width: 40px;
            height: 10px;
            background: #450a0a;
            border-radius: 5px;
        }

        .lantern-shape::after {
            content: '';
            position: absolute;
            bottom: -15px;
            width: 20px;
            height: 30px;
            background: linear-gradient(to bottom, #450a0a 0%, #450a0a 20%, transparent 20%, transparent 100%);
            border-left: 2px solid #450a0a;
            border-right: 2px solid #450a0a;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes scale-punch {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-slideUp { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-scale-punch { animation: scale-punch 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

</head>

</html>
